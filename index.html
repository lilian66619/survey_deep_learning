<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>小组互评系统</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

  <h1>小组互评问卷</h1>

  <form id="surveyForm">

    <div class="section">
      <h2>基础信息</h2>

      <label>你是第几组</label>

      <select id="group" required>
        <option value="">请选择</option>
        <option>第1组</option>
        <option>第2组</option>
        <option>第3组</option>
        <option>第4组</option>
        <option>第5组</option>
        <option>第6组</option>
        <option>第7组</option>
        <option>第8组</option>
      </select>

      <label>你的姓名</label>
      <input type="text" id="name" required>
    </div>

    <div class="section">
      <h2>本组成员打分（1-100）</h2>

      <div id="memberScores"></div>
    </div>

    <div class="section">
      <h2>小组打分（1-100）</h2>

      <div id="groupScores"></div>
    </div>

    <button type="submit">提交问卷</button>

  </form>

  <div id="successMessage"></div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
